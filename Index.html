<!DOCTYPE html>
<html>
<head>
<title>SmartDeals</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#ff6b00;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin:15px 0;

.card img{
width:100%;
border-radius:8px;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
🛍 SmartDeals
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Wireless Earbuds</h3>
<p>High quality Bluetooth earbuds.</p>
<p class="price">₹799</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Smart Watch</h3>
<p>Fitness tracking smartwatch.</p>
<p class="price">₹1299</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Gaming Mouse</h3>

<button>Buy Now</button>

</div>

</html>
